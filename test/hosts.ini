[es_all_in_one]
es-node-1 ansible_host=192.168.56.211 ansible_ssh_private_key_file=.vagrant/machines/es-node-1/virtualbox/private_key
es-node-2 ansible_host=192.168.56.212 ansible_ssh_private_key_file=.vagrant/machines/es-node-2/virtualbox/private_key
es-node-3 ansible_host=192.168.56.213 ansible_ssh_private_key_file=.vagrant/machines/es-node-3/virtualbox/private_key

[all:vars]
ansible_user=vagrant
